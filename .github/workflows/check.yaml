name: "Check"

on:
  workflow_call:
  push:
    branches-ignore:
      - master
    paths:
      - '**/*.sh'
      - 'image/Dockerfile'
  pull_request:
    paths:
      - '**/*.sh'
      - 'image/Dockerfile'

permissions: {}

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: -x
        with:
          severity: error
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: image/Dockerfile
          failure-threshold: warning
