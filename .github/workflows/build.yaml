name: Build
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: build
  cancel-in-progress: false

jobs:
  shellcheck:
    name: Test
    uses: ./.github/workflows/check.yaml
  build:
    name: Build
    needs: shellcheck
    runs-on: ubuntu-latest
    permissions:
      actions: write
      packages: write
      contents: read
    steps:
      -
        name: Get remote package data
        id: tags
        run: |
          set -e -o pipefail
          repo_name="${GITHUB_REPOSITORY##*/}"
          if [ -z "$repo_name" ]; then
            echo "ERROR: Unable to determine repository name from GITHUB_REPOSITORY" >&2
            exit 1
          fi

          debian_release=$(curl -fsSL https://deb.debian.org/debian/dists/stable/Release)
          debian_version=$(echo "$debian_release" | awk -F': ' '/^Version:/ {print $2}')
          debian_codename=$(echo "$debian_release" | awk -F': ' '/^Codename:/ {print $2}')
          debian_version_major=${debian_version%%.*}

          debian_snapshot=$(curl -fsSL "https://registry.hub.docker.com/v2/repositories/library/debian/tags?page_size=100" |
            jq -r '.results[].name' |
            grep "^${debian_codename}-[0-9]\+$" |
            sort -Vr |
            head -n1)
          if [ -z "$debian_snapshot" ]; then
            echo "No docker snapshot tag found for ${debian_codename}"
            exit 1
          fi

          tag=$(curl -fsSL -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/tags?per_page=100 |
            jq -r '.[].name |
            select(startswith("v"))' |
            head -n 1)
          if [ -z "$tag" ]; then
            echo "WARNING: No tag found, using 'v0.0.0' as fallback" >&2
            tag="v0.0.0"
          fi

          echo "repo_name=${repo_name}" >> $GITHUB_ENV
          echo "tag=${tag}" >> $GITHUB_OUTPUT
          echo "latest_snapshot=${tag}-${debian_snapshot}" >> $GITHUB_OUTPUT
          echo "latest_version=${tag}-${debian_version}" >> $GITHUB_OUTPUT
          echo "latest_major=${tag}-${debian_version_major}" >> $GITHUB_OUTPUT
          echo "latest_codename=${tag}-${debian_codename}" >> $GITHUB_OUTPUT
      -
        name: Check if the tag exists locally
        uses: action-pack/tag-exists@v1
        id: checkTag
        with:
          tag: '${{ steps.tags.outputs.latest_snapshot }}'
      -
        name: Finish when found
        run: |
          val="${{ steps.checkTag.outputs.exists }}"
          echo "exists=${val}" >> $GITHUB_ENV
      -
        name: Checkout
        if: env.exists == 'false'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      -
        name: Docker metadata
        id: meta
        if: env.exists == 'false'
        uses: docker/metadata-action@v5
        with:
          context: git
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.tags.outputs.latest_snapshot }},priority=450
            type=raw,value=${{ steps.tags.outputs.latest_version }},priority=350
            type=raw,value=${{ steps.tags.outputs.latest_major }},priority=250
            type=raw,value=${{ steps.tags.outputs.latest_codename }},priority=150
            type=raw,value=latest,priority=100
          labels: |
            org.opencontainers.image.title=${{ env.repo_name }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
      -
        name: Login to GitHub Container Registry
        if: env.exists == 'false'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Set up Docker Buildx
        if: env.exists == 'false'
        uses: docker/setup-buildx-action@v4
      -
        name: Build Docker image
        if: env.exists == 'false'
        uses: docker/build-push-action@v7
        with:
          context: ./image
          push: true
          provenance: false
          platforms: linux/amd64,linux/arm64,linux/arm
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            VERSION_ARG=${{ steps.tags.outputs.latest_snapshot }}
